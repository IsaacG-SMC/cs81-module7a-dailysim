<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Daily Schedule Simulation</title>
</head>
<body style="font-family: sans-serif; text-align: center; padding-top: 60px; background-color: #eef;">

  <h1>My Simulated Day</h1>
  <div id="output" style="margin-top: 40px; font-size: 1.5rem; "></div>

  <script>
    /* My activities:
    * 12am - 2am: Coding
    * 2am - 3am: Phone time
    * 3am - 10am: Sleeping
    * 10am - 11am: Morning routine
    * 11am - 12pm: Physical exercise
    * 12pm - 1pm: Phone time
    * 1pm - 3pm: Online card gaming
    * 3pm - 4pm: Phone time
    * 4pm - 5pm: Reading
    * 5pm - 7pm: Coding
    * 7pm - 8pm: On a walk
    * 9pm - 11pm: Playing Umamusume
    * 10pm - 12am: Drawing
    *
    * Timing: 1 irl hour = 2.5 second -> 24hrs = 60 seconds
    */
    const output = document.getElementById("output");
    const body = document.body;
    const activities = ["Coding", "Coding", "Phone time", "Sleeping",
        "Sleeping", "Sleeping", "Sleeping", "Sleeping", "Sleeping",
        "Sleeping", "Morning routine", "Physical exercise", "Phone time",
        "Online card gaming", "Online card gaming", "Phone time", "Reading",
        "Coding", "Coding", "Taking a walk", "Playing Umamusume",
        "Playing Umamusume", "Drawing", "Drawing"];
    const colors = ["#015cb2", "#0169cb", "#0177e4", "#0184fe", "#1b90fe",
    "#349cfe", "#4da9fe", "#67b5fe", "#80c1fe", "#9acefe", "#b3daff", "#cce6ff"];
    function displayTime(num){
      let time;
      if(num >= 12){
        time = "PM";
      } else {
        time = "AM";
      }
      num %= 12;
      if(num === 0){
        num = 12;
      }
      return num + ":00 " + time;
    }
    // 2/3 chance of an Unexpected Nap
    const randTime = Math.floor(Math.random() * 21) + 10;

    for(let i = 0; i < activities.length; i++) {
      // Changes text displayed output element
      if(i !== randTime) {
        setTimeout(() => {
          let curr = output.innerHTML;
          output.innerHTML = `${displayTime(i)}: ${activities[i]}<br>` + curr;
          if(i < 12) {
            body.style.backgroundColor = colors[i];
          } else {
            body.style.backgroundColor = colors.at((-i)+11);
          }
        }, 2500 * i);
      } else {
        setTimeout(() => {
          let curr = output.innerHTML;
          output.innerHTML = `${displayTime(i)}: Unexpected Nap<br>` + curr;
          if(i < 12) {
            body.style.backgroundColor = colors[i];
          } else {
            body.style.backgroundColor = colors.at((-i)+11);
          }
        }, 2500 * i);
      }
    }

  </script>

</body>
</html>
